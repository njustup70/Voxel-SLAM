version: '3.9'
services:
  superlio-service:
    build:
      context: .
      dockerfile: Dockerfile
    image: dlancy/ros2-superlio:humble
    container_name: superlio-container
    environment:
      - DISPLAY=${DISPLAY}
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=all
      - OMP_WAIT_POLICY=passive
      - TERM=xterm-256color
      - XDG_RUNTIME_DIR=${XDG_RUNTIME_DIR}  # 保持 X11 运行时一致
    volumes:
      - ${XAUTHORITY}:/root/.Xauthority
      - /tmp/.X11-unix:/tmp/.X11-unix
      - ./..:/home/yc-dlan/superlio
    network_mode: host
    pid: "host"
    ipc: "host"
    privileged: true
    stdin_open: true
    tty: true
    user: "yc-dlan"
    #runtime: "nvidia"
    working_dir: "/home/yc-dlan"

  builder:
    build:
      context: .
    image: dlancy/ros2-superlio:humble
    profiles:
      - build-required