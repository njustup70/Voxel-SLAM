version: '3.9'

services:
  slam_service:
    image: elainasuki/rc2026:voxel_slam_ros2
    container_name: voxel_slam_ros2
    environment:
      - DISPLAY=${DISPLAY}
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=all
      - OMP_WAIT_POLICY=passive
      - TERM=xterm-256color
      - RMW_IMPLEMENTATION=rmw_cyclonedds_cpp # 使用CycloneDDS就取消注释此行
      - ROS_LOCALHOST_ONLY=1
    volumes:
      # - ${XAUTHORITY}:/root/.Xauthority
      #可以在windows下使用WSL2的X11服务器但是需要在windows环境目录中添加WSL_X11_SOCKET环境变量
      - /dev:/dev
      # - logical_volume:/home/Elaina/logical
      - ..:/home/Elaina/ros2_ws
    network_mode: host
    pid: "host"
    ipc: "host"
    privileged: true
    stdin_open: true
    tty: true
    user: "Elaina"
    working_dir: "/home/Elaina/ros2_ws"

